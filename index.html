<!doctype html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>教師排座助手</title>
<style>
:root{--ink:#172033;--muted:#68738a;--line:#dce4ef;--paper:#f5f7fb;--navy:#19345e;--blue:#3978ce;--gold:#efb44d;--danger:#be3e4c;--front:#edf5ff}*{box-sizing:border-box}body{margin:0;font-family:"Noto Sans TC","Microsoft JhengHei",sans-serif;background:var(--paper);color:var(--ink)}header{background:var(--navy);color:#fff;padding:18px 30px;display:flex;justify-content:space-between;align-items:center;gap:18px}h1{margin:0;font-size:1.35rem}.sub{font-size:.86rem;opacity:.82}button,input,select,textarea{font:inherit}button{border:0;border-radius:9px;padding:9px 14px;cursor:pointer;background:var(--blue);color:#fff;font-weight:700}button:hover{filter:brightness(.94)}button.secondary{background:#e5edf8;color:var(--navy)}button.danger{background:#fff0f1;color:var(--danger)}button.small{padding:5px 9px;font-size:.82rem}.wrap{max-width:1340px;margin:24px auto;padding:0 22px}.tabs{display:flex;gap:8px;margin-bottom:18px}.tab{background:#e2e8f2;color:var(--navy)}.tab.active{background:var(--navy);color:#fff}.panel{display:none}.panel.active{display:block}.teacher-grid{display:grid;grid-template-columns:370px 1fr;gap:20px}.card{background:#fff;border:1px solid var(--line);border-radius:15px;padding:18px;box-shadow:0 2px 10px #25375d0a}.card h2{font-size:1.05rem;margin:0 0 14px}.field{margin:11px 0}.field label{display:block;font-weight:700;font-size:.9rem;margin-bottom:5px}.field input,.field select,.field textarea{width:100%;border:1px solid #cbd6e5;border-radius:8px;padding:8px;background:#fff}.field textarea{height:145px;resize:vertical}.rows{display:flex;gap:10px}.rows>*{flex:1}.hint{font-size:.82rem;color:var(--muted);line-height:1.55;margin:5px 0}.mode-settings{padding:10px;background:#f7faff;border-radius:10px}.condition{border:1px solid var(--line);border-radius:10px;padding:10px;margin:9px 0;display:grid;grid-template-columns:1.1fr 1fr 1fr auto;gap:7px;align-items:end}.condition label{font-size:.78rem;font-weight:700}.condition select,.condition input{width:100%;padding:7px;border:1px solid #cbd6e5;border-radius:7px}.actions{display:flex;flex-wrap:wrap;gap:9px;margin-top:14px}.layout-toolbar{display:flex;justify-content:space-between;align-items:center;gap:10px;margin-bottom:12px;flex-wrap:wrap}.status{font-size:.86rem;color:var(--muted)}.classroom{min-height:520px;background:linear-gradient(180deg,#f1f7ff,#fff);border:2px solid #cad8e9;border-radius:16px;padding:22px;overflow:auto}.board{max-width:500px;text-align:center;margin:0 auto 28px;padding:10px;background:#26384d;color:#fff;border-radius:8px;font-weight:700;letter-spacing:.15em}.seat-canvas{position:relative;margin:auto;min-height:460px;width:min(100%,900px);border-radius:10px}.seat{position:absolute;width:104px;min-height:70px;cursor:default;touch-action:none;border:2px solid #9bb5d3;background:#fff;border-radius:11px;display:flex;align-items:center;justify-content:center;text-align:center;padding:11px 8px;font-weight:700;box-shadow:0 3px 8px #1f3d6314;word-break:break-all}.seat.front{border-color:#5da3ee;background:var(--front)}.seat.empty{color:#a4afbf;font-weight:500}.seat .remove{position:absolute;right:-8px;top:-9px;width:23px;height:23px;padding:0;border-radius:50%;background:var(--danger);display:none;font-size:16px;line-height:20px}.editor .seat:hover .remove{display:block}.island-label{font-weight:700;color:var(--navy);text-align:center;grid-column:1/-1;margin-top:4px}.projection{background:#101a2b;min-height:calc(100vh - 76px);padding:25px}.projection .projection-card{max-width:1250px;margin:auto;color:#fff}.projection .classroom{min-height:650px;background:#eef5fc;color:var(--ink);border-color:#496681}.projection-title{display:flex;justify-content:space-between;align-items:center;gap:12px;margin-bottom:14px}.projection-title h2{margin:0;font-size:1.7rem}.projection-info{color:#cfdaec}.hidden{display:none!important}.notice{margin:10px 0;padding:10px 12px;border-radius:8px;background:#edf6ff;color:#164f8f;font-size:.9rem}.warning{background:#fff5df;color:#80580c}.legend{font-size:.8rem;color:var(--muted)}@media(max-width:900px){.teacher-grid{grid-template-columns:1fr}.condition{grid-template-columns:1fr 1fr}.seat{width:88px;min-height:62px}header{padding:15px}.wrap{padding:0 12px}}@media print{header,.tabs,.teacher-only,.projection-actions,.remove{display:none!important}body{background:#fff}.projection{background:#fff;padding:0}.projection .classroom{border:0;min-height:0}.projection-title{color:#000}.projection-info{color:#333}}
</style></head>
<body>
<header><div><h1>教師排座助手</h1><div class="sub">後台設定條件，投影時只呈現教室與隨機排座結果</div></div><div id="saveState" class="sub">資料儲存在此瀏覽器</div></header>
<div class="wrap teacher-only"><div class="tabs"><button class="tab active" data-tab="teacher">教師後台</button><button class="tab" data-tab="projector">開啟投影模式</button></div></div>
<main id="teacher" class="panel active wrap"><div class="teacher-grid"><section class="card"><h2>一、班級與名單</h2><div class="field"><label>班級名稱</label><input id="className" value="國文課・示範班"></div><div class="field"><label>學生名單（每行一人）</label><textarea id="roster" placeholder="王小明&#10;陳小華"></textarea><p class="hint">未排入學生會在結果下方提示；座位多於名單會保留「空位」。</p></div><h2>二、座位模式</h2><div class="field"><label>選擇配置</label><select id="layoutMode"><option value="grid">一般模式（橫排 × 直排）</option><option value="island">小島式分組</option><option value="u">ㄇ字型</option></select></div><div id="gridSettings" class="mode-settings"><div class="rows"><div class="field"><label>橫排（欄）</label><input id="cols" type="number" min="1" value="6"></div><div class="field"><label>直排（列）</label><input id="rows" type="number" min="1" value="5"></div></div></div><div id="islandSettings" class="mode-settings hidden"><div class="rows"><div class="field"><label>每組人數</label><input id="perGroup" type="number" min="1" value="4"></div><div class="field"><label>組數</label><input id="groupCount" type="number" min="1" value="6"></div></div></div><div id="uSettings" class="mode-settings hidden"><div class="rows"><div class="field"><label>左側直排座位</label><input id="leftCount" type="number" min="1" value="5"></div><div class="field"><label>右側直排座位</label><input id="rightCount" type="number" min="1" value="5"></div><div class="field"><label>中間橫排座位</label><input id="middleCount" type="number" min="1" value="6"></div></div></div><div class="actions"><button id="generate">依配置產生座位</button><button id="addSeat" class="secondary">＋ 新增座位</button></div></section>
<section class="card editor"><div class="layout-toolbar"><div><h2>三、指定條件與座位編輯</h2><div class="legend">淺藍框為前兩排。雙擊座位可預填固定姓名；點右上角 × 可刪除。</div></div><span id="seatCount" class="status"></span></div><div class="notice">建議先產生座位，再設定條件。固定姓名不會被隨機覆蓋；其餘學生依條件採啟發式隨機分配。</div><h2>指定條件</h2><div id="conditions"></div><button id="addCondition" class="secondary small">＋ 新增條件</button><div id="message"></div><h2 style="margin-top:18px">座位表</h2><div class="classroom"><div class="board">講　臺 ／ 黑　板</div><div id="teacherCanvas" class="seat-canvas"></div></div><div class="actions"><button id="saveConfig">儲存設定</button><button id="openProjection" class="secondary">前往投影模式</button></div></section></div></main>
<main id="projector" class="panel projection"><div class="projection-card"><div class="projection-title"><div><h2 id="projectionClass">國文課</h2><div class="projection-info" id="projectionStatus">座位已就緒，尚未開始安排</div></div><div class="projection-actions"><button id="startArrange">開始排座位</button><button id="backTeacher" class="secondary">返回教師後台</button><button id="print" class="secondary">列印／另存 PDF</button></div></div><div class="classroom"><div class="board">講　臺 ／ 黑　板</div><div id="projectionCanvas" class="seat-canvas"></div></div><div id="projectionNotice" class="notice hidden"></div></div></main>
<script>
const $=s=>document.querySelector(s);let state={seats:[],conditions:[],arranged:false};
function uid(){return Math.random().toString(36).slice(2,9)}function esc(s){return String(s||'').replace(/[&<>'"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;',"'":'&#39;','"':'&quot;'}[c]))}
function settings(){return {className:$('#className').value.trim()||'未命名班級',roster:$('#roster').value.split(/\n/).map(x=>x.trim()).filter(Boolean),mode:$('#layoutMode').value,cols:+$('#cols').value,rows:+$('#rows').value,perGroup:+$('#perGroup').value,groupCount:+$('#groupCount').value,left:+$('#leftCount').value,right:+$('#rightCount').value,middle:+$('#middleCount').value}}
function positionSeats(s){let set=settings(),gapX=126,gapY=88,baseX=45,baseY=18;if(set.mode==='grid'){let width=(set.cols-1)*gapX;return s.map((x,i)=>({...x,row:Math.floor(i/set.cols),col:i%set.cols,group:null,x:baseX+(i%set.cols)*gapX,y:baseY+Math.floor(i/set.cols)*gapY}))}if(set.mode==='island'){let gc=Math.ceil(Math.sqrt(set.groupCount));return s.map((x,i)=>{let g=Math.floor(i/set.perGroup),p=i%set.perGroup;return {...x,row:Math.floor(g/gc)*3+Math.floor(p/2),col:(g%gc)*3+(p%2),group:g+1,x:baseX+(g%gc)*290+(p%2)*120,y:baseY+Math.floor(g/gc)*215+Math.floor(p/2)*88}})}
let max=Math.max(set.left,set.right),centerX=390;return s.map((x,i)=>{if(i<set.right)return {...x,row:i,col:2,group:null,x:700,y:baseY+i*gapY};if(i<set.right+set.left)return {...x,row:i-set.right,col:0,group:null,x:70,y:baseY+(i-set.right)*gapY};let p=i-set.right-set.left;return {...x,row:max,col:p+1,group:null,x:centerX+(p-(set.middle-1)/2)*gapX,y:baseY+max*gapY}})}
function buildTemplate(){let set=settings(),n=set.mode==='grid'?set.rows*set.cols:set.mode==='island'?set.perGroup*set.groupCount:set.left+set.right+set.middle;state.seats=positionSeats(Array.from({length:n},()=>({id:uid(),fixed:''})));state.arranged=false;renderAll();show('已依所選模式產生 '+n+' 個座位。','ok')}
function addSeat(){let c=$('#teacherCanvas'),x=Math.max(12,(c.clientWidth-104)/2);state.seats.push({id:uid(),fixed:'',row:0,col:0,group:null,x,y:12});state.arranged=false;renderAll();show('已在講台前方新增一個座位，可直接拖曳調整。','ok')}
function renderCanvas(target,editable=false,names=null){let c=$(target);c.innerHTML='';let seats=state.seats;seats.forEach((seat,i)=>{let d=document.createElement('div'),px=Number.isFinite(seat.x)?seat.x:45+seat.col*126,py=Number.isFinite(seat.y)?seat.y:18+seat.row*88;d.className='seat '+(seat.row<2?'front ':'')+(!(names?names[i]:seat.fixed)?'empty':'');d.style.left=px+'px';d.style.top=py+'px';d.dataset.id=seat.id;d.textContent=names?names[i]||'空位':seat.fixed||'座位';if(editable){d.title='拖曳調整位置；雙擊填入固定姓名';d.style.cursor='grab';let remove=document.createElement('button');remove.className='remove';remove.textContent='×';remove.title='刪除座位';remove.onclick=e=>{e.stopPropagation();state.seats=state.seats.filter(a=>a.id!==seat.id);state.arranged=false;renderAll();show('已刪除座位。','ok')};d.append(remove);d.ondblclick=()=>{let v=prompt('輸入此座位的固定學生姓名（清空即取消固定）：',seat.fixed);if(v!==null){seat.fixed=v.trim();state.arranged=false;renderAll();}};d.onpointerdown=e=>{if(e.target.closest('.remove'))return;e.preventDefault();let rect=c.getBoundingClientRect(),startX=e.clientX-rect.left-px,startY=e.clientY-rect.top-py;try{d.setPointerCapture(e.pointerId)}catch(_){ }d.style.cursor='grabbing';const move=ev=>{let maxX=Math.max(0,c.clientWidth-d.offsetWidth),maxY=Math.max(0,c.clientHeight-d.offsetHeight);let nx=Math.max(0,Math.min(maxX,ev.clientX-rect.left-startX)),ny=Math.max(0,Math.min(maxY,ev.clientY-rect.top-startY));d.style.left=nx+'px';d.style.top=ny+'px';seat.x=Math.round(nx);seat.y=Math.round(ny)};const end=ev=>{d.removeEventListener('pointermove',move);d.removeEventListener('pointerup',end);d.removeEventListener('pointercancel',end);if(d.hasPointerCapture(ev.pointerId))d.releasePointerCapture(ev.pointerId);d.style.cursor='grab';state.arranged=false;save();renderCanvas('#projectionCanvas',false,Array(state.seats.length).fill(''))};d.addEventListener('pointermove',move);d.addEventListener('pointerup',end);d.addEventListener('pointercancel',end)}}c.append(d)})}
function renderAll(){renderCanvas('#teacherCanvas',true);renderCanvas('#projectionCanvas',false,state.arranged?state.result:Array(state.seats.length).fill(''));$('#seatCount').textContent=`目前 ${state.seats.length} 個座位`;$('#projectionClass').textContent=settings().className;$('#projectionStatus').textContent=state.arranged?'座位安排完成':'座位已就緒，尚未開始安排';}
function conditionHTML(c={type:'notAdjacent',a:'',b:''}){let d=document.createElement('div');d.className='condition';d.innerHTML=`<div><label>條件</label><select class="ctype"><option value="notAdjacent">兩人不能相鄰</option><option value="front">安排在前兩排</option><option value="back">安排在後兩排</option></select></div><div><label class="aLabel">學生 A</label><input class="ca" placeholder="姓名"></div><div class="bWrap"><label>學生 B</label><input class="cb" placeholder="姓名"></div><button class="danger small delCond">刪除</button>`;d.querySelector('.ctype').value=c.type;d.querySelector('.ca').value=c.a;d.querySelector('.cb').value=c.b;function refresh(){let two=d.querySelector('.ctype').value==='notAdjacent';d.querySelector('.bWrap').classList.toggle('hidden',!two);d.querySelector('.aLabel').textContent=two?'學生 A':'學生姓名'}refresh();d.querySelector('.ctype').onchange=refresh;d.querySelector('.delCond').onclick=()=>d.remove();$('#conditions').append(d)}
function collectConditions(){return [...document.querySelectorAll('.condition')].map(d=>({type:d.querySelector('.ctype').value,a:d.querySelector('.ca').value.trim(),b:d.querySelector('.cb').value.trim()})).filter(x=>x.a&&(x.type!=='notAdjacent'||x.b))}
function adjacency(a,b){return Math.abs(a.row-b.row)+Math.abs(a.col-b.col)===1}
function shuffle(a){return a.map(x=>[Math.random(),x]).sort((a,b)=>a[0]-b[0]).map(x=>x[1])}
function arrange(){let set=settings(),roster=[...set.roster],conds=collectConditions();let used=new Set(),out=Array(state.seats.length).fill('');let fixed={};state.seats.forEach((s,i)=>{if(s.fixed){fixed[s.fixed]=i;out[i]=s.fixed;used.add(s.fixed)}});let warnings=[];Object.entries(fixed).forEach(([name,i])=>{if(!roster.includes(name))warnings.push('固定姓名「'+name+'」不在名單中，但已保留。')});let people=shuffle(roster.filter(x=>!used.has(x)));function candidates(name){let front=conds.some(c=>c.type==='front'&&c.a===name),back=conds.some(c=>c.type==='back'&&c.a===name);let base=state.seats.map((s,i)=>i).filter(i=>!out[i]);let preferred=base.filter(i=>front?state.seats[i].row<2:back?state.seats[i].row>=Math.max(...state.seats.map(s=>s.row))-1:true);return preferred.length?shuffle(preferred):shuffle(base)}function valid(name,i){return !conds.some(c=>{if(c.type!=='notAdjacent')return false;let other=c.a===name?c.b:c.b===name?c.a:null;return other&&out.some((n,j)=>n===other&&adjacency(state.seats[i],state.seats[j]));})}
for(let name of people){let choices=candidates(name),i=choices.find(i=>valid(name,i));if(i===undefined){i=choices[0];warnings.push('「'+name+'」無法同時滿足所有相鄰限制，已採最佳可用位置。')}if(i===undefined){warnings.push('座位不足，未安排「'+name+'」。');continue}out[i]=name}conds.filter(c=>c.type==='front'||c.type==='back').forEach(c=>{let i=out.indexOf(c.a);if(i>=0){let ok=c.type==='front'?state.seats[i].row<2:state.seats[i].row>=Math.max(...state.seats.map(s=>s.row))-1;if(!ok)warnings.push('「'+c.a+'」未能符合'+(c.type==='front'?'前兩排':'後兩排')+'條件。')}});state.result=out;state.arranged=true;renderAll();$('#projectionNotice').classList.toggle('hidden',!warnings.length);$('#projectionNotice').textContent=warnings.length?'教師提醒：'+warnings.join('　'):'';save();}
function show(text,type){$('#message').innerHTML=`<div class="notice ${type==='warn'?'warning':''}">${esc(text)}</div>`;setTimeout(()=>$('#message').innerHTML='',3500)}
function save(){state.conditions=collectConditions();localStorage.setItem('seatingHelperV1',JSON.stringify({state,form:{className:$('#className').value,roster:$('#roster').value,mode:$('#layoutMode').value,cols:$('#cols').value,rows:$('#rows').value,perGroup:$('#perGroup').value,groupCount:$('#groupCount').value,left:$('#leftCount').value,right:$('#rightCount').value,middle:$('#middleCount').value}}));$('#saveState').textContent='✓ 已儲存於此瀏覽器'}
function load(){try{let x=JSON.parse(localStorage.getItem('seatingHelperV1'));if(x){state=x.state||state;Object.entries(x.form||{}).forEach(([k,v])=>{let el=$('#'+k);if(el)el.value=v});(state.conditions||[]).forEach(conditionHTML)}}catch(e){}if(!state.seats.length)buildTemplate();else renderAll();toggleMode()}
function toggleMode(){let m=$('#layoutMode').value;$('#gridSettings').classList.toggle('hidden',m!=='grid');$('#islandSettings').classList.toggle('hidden',m!=='island');$('#uSettings').classList.toggle('hidden',m!=='u')}
function switchTab(name){document.querySelectorAll('.panel').forEach(x=>x.classList.remove('active'));$('#'+name).classList.add('active');document.querySelectorAll('.tab').forEach(x=>x.classList.toggle('active',x.dataset.tab===name));if(name==='projector'){renderAll();window.scrollTo(0,0)}}
document.querySelectorAll('.tab').forEach(b=>b.onclick=()=>switchTab(b.dataset.tab));$('#layoutMode').onchange=()=>{toggleMode();state.arranged=false};$('#generate').onclick=buildTemplate;$('#addSeat').onclick=addSeat;$('#addCondition').onclick=()=>conditionHTML();$('#saveConfig').onclick=()=>{save();show('設定已儲存。','ok')};$('#openProjection').onclick=()=>switchTab('projector');$('#backTeacher').onclick=()=>switchTab('teacher');$('#startArrange').onclick=arrange;$('#print').onclick=()=>window.print();load();
</script></body></html>
